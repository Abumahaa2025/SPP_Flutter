# Beta APK built on GitHub — does NOT use EAS monthly quota.
# Installable debug APK for internal beta testing (same JS bundle, signed debug).
name: Beta APK — GitHub (no EAS quota)

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Build note (optional)'
        required: false
        default: 'manual beta build'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android native project
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_BETA_MODE: 'true'
          EXPO_PUBLIC_BACKEND_URL: https://spp-beta-api.onrender.com

      - name: Assemble debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/spp-beta-${VERSION}.apk"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: spp-beta-apk
          path: frontend/dist/*.apk
          retention-days: 90

      - name: Build summary
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "## Beta APK (GitHub CI)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Note: ${{ github.event.inputs.note }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download: **Actions → this run → Artifacts → spp-beta-apk**" >> "$GITHUB_STEP_SUMMARY"
