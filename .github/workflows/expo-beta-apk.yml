# SPP Beta APK — final distribution pipeline.
# Uses eas build --local with EAS-managed Android keystore (same signing as all prior EAS preview builds).
# No EAS cloud build quota consumed. Publishes to GitHub Release for direct mobile download.
#
# Required secret (one-time): EXPO_TOKEN
# Create at: https://expo.dev/accounts/abumahaa2025/settings/access-tokens
name: Expo Beta APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch with frontend/ Expo app'
        required: false
        default: 'conflict_030726_0550'
      note:
        description: 'Build note (optional)'
        required: false
        default: 'Beta release'
      release_tag:
        description: 'GitHub Release tag'
        required: false
        default: 'v1.0.0-beta.10'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Require EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing EXPO_TOKEN secret. Create a token at https://expo.dev/accounts/abumahaa2025/settings/access-tokens and add it to GitHub repo secrets as EXPO_TOKEN."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: EAS local build (EAS signing key — upgrade-safe)
        env:
          EXPO_PUBLIC_BETA_MODE: 'true'
          EXPO_PUBLIC_BACKEND_URL: https://spp-beta-api.onrender.com
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          mkdir -p dist
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output "dist/spp-beta-${VERSION}.apk"
          cp "dist/spp-beta-${VERSION}.apk" dist/spp-beta.apk
          ls -la dist/

      - name: Verify APK
        run: |
          APK="dist/spp-beta.apk"
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools"/* | sort -V | tail -n1)
          "$BUILD_TOOLS/apksigner" verify --verbose "$APK"
          "$BUILD_TOOLS/aapt" dump badging "$APK" | head -n5

      - uses: actions/upload-artifact@v4
        with:
          name: spp-beta-apk
          path: frontend/dist/*.apk
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Beta 10
          body: |
            SPP Beta 10 — signed with the same EAS Android key as all previous beta releases.

            **Direct install (Android / Chrome):**
            https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.release_tag }}/spp-beta.apk

            Installs over previous beta versions without uninstalling. User data is preserved.

            Built from `${{ github.event.inputs.branch }}` via EAS local build on GitHub Actions.
          files: |
            frontend/dist/spp-beta.apk
            frontend/dist/spp-beta-*.apk
          prerelease: true
          make_latest: true
          overwrite_files: true

      - name: Summary
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          TAG="${{ github.event.inputs.release_tag }}"
          echo "## SPP Beta APK (EAS-signed)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.event.inputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signing: EAS preview keystore (upgrade-safe)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Direct APK: https://github.com/${{ github.repository }}/releases/download/${TAG}/spp-beta.apk" >> "$GITHUB_STEP_SUMMARY"
