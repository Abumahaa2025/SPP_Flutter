# SPP Beta APK — final distribution pipeline.
# Uses EAS cloud build with EAS-managed Android keystore (same signing as all prior preview builds).
# Downloads APK and publishes to GitHub Release for direct mobile install.
#
# Required secret: EXPO_TOKEN
# Create at: https://expo.dev/accounts/abumahaa2025/settings/access-tokens
name: Expo Beta APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch with frontend/ Expo app'
        required: false
        default: 'conflict_030726_0550'
      note:
        description: 'Build note (optional)'
        required: false
        default: 'Beta release'
      release_tag:
        description: 'GitHub Release tag'
        required: false
        default: 'v1.0.0-beta.10'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Require EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing EXPO_TOKEN secret."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: EAS cloud build (EAS signing key — upgrade-safe)
        id: eas
        env:
          EXPO_PUBLIC_BETA_MODE: 'true'
          EXPO_PUBLIC_BACKEND_URL: https://spp-beta-api.onrender.com
        run: |
          mkdir -p dist
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json > build-result.json
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('build-result.json','utf8'));
            const b = Array.isArray(r) ? r[0] : r;
            const url = b?.artifacts?.buildUrl || b?.artifacts?.applicationArchiveUrl || '';
            if (!url) {
              console.error('No APK URL in build result:', JSON.stringify(b, null, 2));
              process.exit(1);
            }
            fs.writeFileSync('apk-url.txt', url);
            console.log('APK URL:', url);
          "
          curl -fL "$(cat apk-url.txt)" -o dist/spp-beta.apk
          VERSION=$(node -p "require('./app.json').expo.version")
          cp dist/spp-beta.apk "dist/spp-beta-${VERSION}.apk"
          ls -la dist/

      - name: Verify APK
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zipalign apksigner aapt 2>/dev/null || true
          APK="dist/spp-beta.apk"
          if command -v apksigner >/dev/null; then
            apksigner verify --verbose "$APK"
          fi
          file "$APK"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: spp-beta-apk
          path: frontend/dist/*.apk
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Beta 10
          body: |
            SPP Beta 10 — signed with the same EAS Android key as all previous beta releases.

            **Direct install (Android / Chrome):**
            https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.release_tag }}/spp-beta.apk

            Installs over previous beta versions without uninstalling. User data is preserved.
          files: |
            frontend/dist/spp-beta.apk
            frontend/dist/spp-beta-*.apk
          prerelease: true
          make_latest: true
          overwrite_files: true

      - name: Summary
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          TAG="${{ github.event.inputs.release_tag }}"
          echo "## SPP Beta APK (EAS-signed)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.event.inputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signing: EAS preview keystore (upgrade-safe)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Direct APK: https://github.com/${{ github.repository }}/releases/download/${TAG}/spp-beta.apk" >> "$GITHUB_STEP_SUMMARY"
